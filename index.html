<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JS DISTRIBUTORS POS</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

/* HEADER */
header {
  background:#0d6efd;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-around;
  background:#fff;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
nav button {
  background:#0d6efd;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
  width:30%;
}

/* CONTAINER */
.container {
  padding:15px;
}

/* CARD */
.card {
  background:#fff;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* INPUTS */
input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTONS */
button {
  cursor:pointer;
}
.btn {
  background:#0d6efd;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  width:100%;
}
.btn-success { background:#198754; }
.btn-danger { background:#dc3545; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>JS DISTRIBUTORS POS (KES)</header>

<div class="container">

<!-- LOGIN -->
<div id="loginSection">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<nav>
  <button onclick="showSection('pos')">POS</button>
  <button onclick="showSection('inventory')">Inventory</button>
  <button onclick="showSection('transfer')">Transfers</button>
</nav>

<!-- POS -->
<div id="pos">
  <h3>Products</h3>
  <div id="products"></div>

  <h3>Cart</h3>
  <div id="cart"></div>
  <button class="btn-success" onclick="checkout()">Checkout</button>
</div>

<!-- INVENTORY -->
<div id="inventory" style="display:none">

  <h3>Available Stock</h3>
  <div id="stockList"></div>

  <h3>Add New Product</h3>
  <div class="grid">
    <input id="item_id" placeholder="Item ID">
    <input id="pname" placeholder="Name">
    <input id="model" placeholder="Model">
    <input id="category" placeholder="Category">
    <input id="price" type="number" placeholder="Price">
    <input id="cost" type="number" placeholder="Cost">
    <input id="stock_qty" type="number" placeholder="Stock Quantity">
  </div>
  <button class="btn" onclick="addProduct()">Add Product</button>

  <h3>Add Stock</h3>
  <select id="stockProduct"></select>
  <input id="addQty" type="number" placeholder="Quantity">
  <button class="btn-success" onclick="addStock()">Add Stock</button>

</div>

<!-- TRANSFER -->
<div id="transfer" style="display:none">

  <h3>Add Agent</h3>
  <input id="agentName" placeholder="Agent Name">
  <input id="agentPhone" placeholder="Phone Number">
  <input id="agentId" placeholder="ID Number">
  <button class="btn" onclick="addAgent()">Save Agent</button>

  <h3>Transfer Stock</h3>
  <select id="agentSelect"></select>
  <select id="transferProduct"></select>
  <input id="transferQty" type="number" placeholder="Quantity">
  <button class="btn-success" onclick="transferStock()">Transfer</button>

  <h3>Transfer History</h3>
  <div id="transferHistory"></div>

</div>

</div>
</div>

<script>
const API = "https://js-pos-backend.onrender.com/";

let products = [];
let cart = [];

// LOGIN
async function login(){
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  loginSection.style.display = "none";
  app.style.display = "block";

  loadAll();
}

// NAVIGATION
function showSection(section){
  ["pos","inventory","transfer"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(section).style.display="block";
}

// LOAD ALL DATA
function loadAll(){
  loadProducts();
  loadStock();
  loadAgents();
  loadTransfers();
}

// PRODUCTS
async function loadProducts(){
  const res = await fetch(API + "/products");
  products = await res.json();

  let html = "";
  products.forEach((p,i)=>{
    html += `<div class="card">
      ${p.name} - KES ${p.price} (Stock: ${p.stock})
      <button class="btn" onclick="addToCart(${i})">Add</button>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

// CART
function addToCart(i){
  if(products[i].stock <= 0){
    alert("Out of stock");
    return;
  }
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let total = 0;
  let html = "";

  cart.forEach(p=>{
    total += p.price;
    html += `<div>${p.name} - ${p.price}</div>`;
  });

  html += `<h3>Total: KES ${total}</h3>`;
  document.getElementById("cart").innerHTML = html;
}

// CHECKOUT
async function checkout(){
  alert("Payment successful (M-Pesa simulated)");

  cart.forEach(async p=>{
    await fetch(API + "/add-stock", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        product_id:p.id,
        quantity:-1
      })
    });
  });

  cart = [];
  renderCart();
  loadAll();
}

// INVENTORY
async function loadStock(){
  const res = await fetch(API + "/products");
  const data = await res.json();

  let html = "";
  stockProduct.innerHTML = "";
  transferProduct.innerHTML = "";

  data.forEach(p=>{
    html += `<div class="card">
      [${p.item_id}] ${p.name} - ${p.stock}
    </div>`;

    stockProduct.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    transferProduct.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });

  stockList.innerHTML = html;
}

// ADD PRODUCT
async function addProduct(){
  await fetch(API + "/products", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      item_id:item_id.value,
      name:pname.value,
      model:model.value,
      category:category.value,
      price:+price.value,
      cost:+cost.value,
      stock:+stock_qty.value
    })
  });

  loadAll();
}

// ADD STOCK
async function addStock(){
  await fetch(API + "/add-stock", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      product_id:stockProduct.value,
      quantity:+addQty.value
    })
  });

  loadStock();
}

// AGENTS
async function loadAgents(){
  const res = await fetch(API + "/agents");
  const data = await res.json();

  agentSelect.innerHTML = "";
  data.forEach(a=>{
    agentSelect.innerHTML += `<option value="${a.id}">
      ${a.name} (${a.phone})
    </option>`;
  });
}

// ADD AGENT
async function addAgent(){
  await fetch(API + "/agents", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:agentName.value,
      phone:agentPhone.value,
      id_number:agentId.value
    })
  });

  loadAgents();
}

// TRANSFER
async function transferStock(){
  const res = await fetch(API + "/transfer", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      agent_id:agentSelect.value,
      product_id:transferProduct.value,
      quantity:+transferQty.value
    })
  });

  const data = await res.json();
  if(data.error){
    alert(data.error);
    return;
  }

  alert("Transfer successful");
  loadAll();
}

// TRANSFER HISTORY
async function loadTransfers(){
  const res = await fetch(API + "/transfers");
  const data = await res.json();

  let html = "";
  data.forEach(t=>{
    html += `<div class="card">
      ${t.agent_name} → ${t.product_name} (${t.quantity})
    </div>`;
  });

  transferHistory.innerHTML = html;
}
</script>
  <script>
const API = "http://localhost:3000";

document.getElementById("loginBtn").addEventListener("click", login);

async function login(){
  console.log("Login button clicked"); // DEBUG

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(!username || !password){
    alert("Enter username and password");
    return;
  }

  try{
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    console.log(data); // DEBUG

    if(data.error){
      alert(data.error);
      return;
    }

    alert("✅ Login success");

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("app").style.display = "block";

  }catch(err){
    console.error(err);
    alert("❌ Cannot connect to server");
  }
}
</script>

</body>
</html>
