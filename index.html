<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JS DISTRIBUTORS POS</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:15px; text-align:center; }
.container { padding:15px; }
input, button { padding:10px; margin:5px; width:100%; border-radius:8px; border:1px solid #ccc; }
button { background:#111; color:#fff; cursor:pointer; }
.card { background:#fff; padding:10px; margin:10px 0; border-radius:10px; }
</style>
</head>
<body>

<header>
<h2>JS DISTRIBUTORS POS (KES)</h2>
</header>

<div class="container">

<div id="loginSection">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
  <h3>Welcome <span id="userDisplay"></span></h3>
  <button onclick="showSection('pos')">POS</button>
  <button onclick="showSection('inventory')">Inventory</button>
  <button onclick="showSection('reports')">Reports</button>
  <button onclick="logout()">Logout</button>

  <div id="pos">
    <h3>Products</h3>
    <div id="products"></div>
    <h3>Cart</h3>
    <div id="cart"></div>
    <button onclick="checkout()">Pay (M-Pesa)</button>
  </div>

  <div id="inventory" style="display:none">
    <h3>Add Product</h3>
    <input id="pname" placeholder="Name">
    <input id="pprice" type="number" placeholder="Price">
    <input id="pcost" type="number" placeholder="Cost">
    <input id="pstock" type="number" placeholder="Stock">
    <button onclick="addProduct()">Add</button>
  </div>

  <div id="reports" style="display:none">
    <h3>Sales Report</h3>
    <div id="reportData"></div>
  </div>

</div>
</div>

<script>
const API = "http://localhost:3000"; // Change to deployed backend URL
let token = "";
let products = [];
let cart = [];

async function login() {
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:username.value,password:password.value})
  });
  if(res.status!==200){ alert("Login failed"); return; }
  const data = await res.json();
  token = data.token;
  document.getElementById("loginSection").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userDisplay").innerText=username.value;
  loadProducts();
}

function logout(){ location.reload(); }

function showSection(id){
  ["pos","inventory","reports"].forEach(x=>document.getElementById(x).style.display="none");
  document.getElementById(id).style.display="block";
  if(id==="reports") loadReports();
}

async function loadProducts(){
  const res = await fetch(API+"/products",{ headers:{ "Authorization":token } });
  products = await res.json();
  renderProducts();
}

function renderProducts(){
  const div = document.getElementById("products");
  div.innerHTML = "";
  products.forEach((p,i)=>{
    div.innerHTML+=`<div class="card">${p.name} - KES ${p.price} (Stock:${p.stock}) 
    <button onclick="addToCart(${i})">Add</button></div>`;
  });
}

function addToCart(i){
  if(products[i].stock<=0){ alert("Out of stock"); return; }
  products[i].stock--; cart.push(products[i]); renderProducts(); renderCart();
}

function renderCart(){
  const div = document.getElementById("cart"); let total=0;
  div.innerHTML=""; cart.forEach(p=>{ total+=p.price; div.innerHTML+=`<div>${p.name} - ${p.price}</div>`; });
  div.innerHTML+=`<h3>Total: KES ${total}</h3>`;
}

async function addProduct(){
  const p = { name:pname.value, price:+pprice.value, cost:+pcost.value, stock:+pstock.value };
  await fetch(API+"/products",{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":token }, body:JSON.stringify(p)});
  loadProducts();
}

async function checkout(){
  const total = cart.reduce((s,p)=>s+p.price,0);
  const profit = cart.reduce((s,p)=>s+p.price-p.cost,0);
  const phone = prompt("Enter M-Pesa phone number:");

  const pay = await fetch(API+"/mpesa",{ method:"POST", headers:{"Content-Type":"application/json","Authorization":token}, body:JSON.stringify({phone, amount:total}) });
  const data = await pay.json(); if(!data.success){ alert("Payment failed"); return; }

  await fetch(API+"/sale",{ method:"POST", headers:{"Content-Type":"application/json","Authorization":token}, body:JSON.stringify({items:cart,total,profit}) });
  alert("Sale recorded!");
  printReceipt(cart,total);
  cart=[]; renderCart();
}

function printReceipt(cart,total){
  let text=`JS DISTRIBUTORS\n----------------\n`;
  cart.forEach(p=>text+=`${p.name} - KES ${p.price}\n`);
  text+=`----------------\nTOTAL: KES ${total}\n`;
  const w=window.open(""); w.document.write("<pre>"+text+"</pre>"); w.print();
}

async function loadReports(){
  const res = await fetch(API+"/sales",{ headers:{ "Authorization":token }});
  const data = await res.json();
  const div = document.getElementById("reportData"); div.innerHTML="";
  data.forEach(s=>{ div.innerHTML+=`<div class="card">${s.date}: ${s.user} sold KES ${s.total} (Profit:${s.profit})</div>`; });
}
</script>

</body>
</html>
