<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JS DISTRIBUTORS POS</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:15px; text-align:center; }
.container { padding:15px; }
input, button, select { padding:10px; margin:5px; width:100%; border-radius:8px; border:1px solid #ccc; }
button { background:#111; color:#fff; cursor:pointer; }
.card { background:#fff; padding:10px; margin:10px 0; border-radius:10px; }
</style>
</head>
<body>

<header><h2>JS DISTRIBUTORS POS (KES)</h2></header>
<div class="container">

<div id="loginSection">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
  <h3>Welcome <span id="userDisplay"></span></h3>
  <button onclick="showSection('pos')">POS</button>
  <button onclick="showSection('inventory')">Inventory</button>
  <button onclick="showSection('reports')">Reports</button>
  <button onclick="showSection('transfer')">Stock Transfer</button>
  <button onclick="logout()">Logout</button>

  <!-- POS -->
  <div id="pos">
    <h3>Products</h3>
    <div id="products"></div>
    <h3>Cart</h3>
    <div id="cart"></div>
    <button onclick="checkout()">Pay (M-Pesa)</button>
  </div>

  <!-- Inventory -->
  <div id="inventory" style="display:none">
    <h3>Add Product</h3>
    <input id="item_id" placeholder="Item ID / SKU">
    <input id="pname" placeholder="Name">
    <input id="model" placeholder="Model">
    <input id="category" placeholder="Category">
    <input id="pprice" type="number" placeholder="Price">
    <input id="pcost" type="number" placeholder="Cost">
    <input id="pstock" type="number" placeholder="Stock">
    <button onclick="addProduct()">Add</button>
  </div>

  <!-- Reports -->
  <div id="reports" style="display:none">
    <h3>Sales Report</h3>
    <div id="reportData"></div>
  </div>

  <!-- Stock Transfer -->
  <div id="transfer" style="display:none">
    <h3>Stock Transfer</h3>
    <select id="transferProduct"></select>
    <input id="transferQty" type="number" placeholder="Quantity">
    <input id="fromLocation" placeholder="From Location">
    <input id="toLocation" placeholder="To Location">
    <button onclick="createTransfer()">Transfer Stock</button>
    <h4>Transfer History</h4>
    <div id="transferHistory"></div>
  </div>

</div>
</div>

<script>
const API = "http://localhost:3000"; // Change if deployed
let token=""; let products=[]; let cart=[];

// LOGIN
async function login(){
  const res = await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username.value,password:password.value})});
  if(res.status!==200){ alert("Login failed"); return; }
  const data = await res.json(); token=data.token;
  document.getElementById("loginSection").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userDisplay").innerText=username.value;
  loadProducts(); loadTransferProducts();
}

// LOGOUT
function logout(){ location.reload(); }

// NAVIGATION
function showSection(id){
  ["pos","inventory","reports","transfer"].forEach(x=>document.getElementById(x).style.display="none");
  document.getElementById(id).style.display="block";
  if(id==="reports") loadReports();
  if(id==="transfer"){ loadTransferProducts(); loadTransfers(); }
}

// ---------------- PRODUCTS ----------------
async function loadProducts(){
  const res = await fetch(API+"/products",{headers:{"Authorization":token}});
  products = await res.json(); renderProducts();
}

function renderProducts(){
  const div = document.getElementById("products"); div.innerHTML="";
  products.forEach((p,i)=>{ div.innerHTML+=`<div class="card">[${p.item_id}] ${p.name} - ${p.model} - ${p.category} - KES ${p.price} (Stock:${p.stock}) <button onclick="addToCart(${i})">Add</button></div>`; });
}

async function addProduct(){
  const p={item_id:item_id.value,name:pname.value,model:model.value,category:category.value,price:+pprice.value,cost:+pcost.value,stock:+pstock.value};
  await fetch(API+"/products",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify(p)});
  loadProducts(); loadTransferProducts();
}

// ---------------- CART ----------------
function addToCart(i){
  if(products[i].stock<=0){ alert("Out of stock"); return; }
  products[i].stock--; cart.push(products[i]); renderProducts(); renderCart();
}

function renderCart(){
  const div = document.getElementById("cart"); let total=0; div.innerHTML="";
  cart.forEach(p=>{ total+=p.price; div.innerHTML+=`<div>${p.name} - ${p.price}</div>`; });
  div.innerHTML+=`<h3>Total: KES ${total}</h3>`;
}

// ---------------- CHECKOUT ----------------
async function checkout(){
  const total = cart.reduce((s,p)=>s+p.price,0);
  const profit = cart.reduce((s,p)=>s+p.price-p.cost,0);
  const phone = prompt("Enter M-Pesa phone:");
  const pay = await fetch(API+"/mpesa",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({phone,amount:total})});
  const data = await pay.json(); if(!data.success){ alert("Payment failed"); return; }
  await fetch(API+"/sale",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({items:cart,total,profit})});
  alert("Sale recorded!"); printReceipt(cart,total); cart=[]; renderCart();
}

function printReceipt(cart,total){
  let text=`JS DISTRIBUTORS\n----------------\n`; cart.forEach(p=>text+=`[${p.item_id}] ${p.name} - ${p.model} - ${p.category} - KES ${p.price}\n`);
  text+=`----------------\nTOTAL: KES ${total}\n`; const w=window.open(""); w.document.write("<pre>"+text+"</pre>"); w.print();
}

// ---------------- REPORTS ----------------
async function loadReports(){
  const res = await fetch(API+"/sales",{headers:{"Authorization":token}});
  const data = await res.json();
  const div = document.getElementById("reportData"); div.innerHTML="";
  data.forEach(s=>{ div.innerHTML+=`<div class="card">${s.date}: ${s.user} sold KES ${s.total} (Profit:${s.profit})</div>`; });
}

// ---------------- TRANSFERS ----------------
async function loadTransferProducts(){
  const res = await fetch(API+"/products",{headers:{"Authorization":token}});
  const data = await res.json();
  const select = document.getElementById("transferProduct"); select.innerHTML="";
  data.forEach(p=>{ select.innerHTML+=`<option value="${p.id}">${p.name} (Stock: ${p.stock})</option>`; });
}

async function createTransfer(){
  const product_id = transferProduct.value;
  const quantity = +transferQty.value;
  const from_location = fromLocation.value;
  const to_location = toLocation.value;
  const res = await fetch(API+"/transfer",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({product_id,quantity,from_location,to_location})});
  const data = await res.json();
  if(data.success){ alert("Stock transferred!"); loadTransferProducts(); loadTransfers(); } else { alert(data.error); }
}

async function loadTransfers(){
  const res = await fetch(API+"/transfers",{headers:{"Authorization":token}});
  const data = await res.json();
  const div = document.getElementById("transferHistory"); div.innerHTML="";
  data.forEach(t=>{ div.innerHTML+=`<div>${t.date}: ${t.quantity} x ${t.product} from ${t.from_location} → ${t.to_location}</div>`; });
}
</script>
</body>
</html>
