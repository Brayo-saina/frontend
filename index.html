<!DOCTYPE html>
<html>
<head>
  <title>JS DISTRIBUTORS POS</title>
</head>
<body>

<h2>JS DISTRIBUTORS POS</h2>

<div id="login">
  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
  <h3>POS</h3>

  <input id="pname" placeholder="product">
  <input id="price" placeholder="price">
  <input id="cost" placeholder="cost">
  <input id="stock" placeholder="stock">
  <button onclick="addProduct()">Add Product</button>

  <div id="products"></div>

  <button onclick="sell()">Sell</button>
</div>

<script>
const API = "http://localhost:3000";
let token = "";

async function login(){
  let res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  if(res.status!==200) return alert("Login failed");

  let data = await res.json();
  token = data.token;

  loginDiv.style.display="none";
  app.style.display="block";
  loadProducts();
}

async function addProduct(){
  await fetch(API+"/products",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      name:pname.value,
      price:+price.value,
      cost:+cost.value,
      stock:+stock.value
    })
  });

  loadProducts();
}

async function loadProducts(){
  let res = await fetch(API+"/products",{
    headers:{ "Authorization":token }
  });

  let data = await res.json();
  products.innerHTML = JSON.stringify(data);
}

async function sell(){
  await fetch(API+"/sale",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      total:1000,
      profit:200
    })
  });

  alert("Sale recorded");
}
</script>

</body>
</html>
