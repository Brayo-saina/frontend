<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JS DISTRIBUTORS POS</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f1f3f6;
}

/* HEADER */
header {
  background:#0d1117;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-around;
  background:#161b22;
  padding:10px;
}
nav button {
  background:none;
  border:none;
  color:#fff;
  font-weight:bold;
}

/* CONTAINER */
.container {
  padding:15px;
}

/* CARD */
.card {
  background:#fff;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* INPUTS */
input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button.action {
  background:#0d6efd;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

button.success { background:#198754; }
button.danger { background:#dc3545; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>JS DISTRIBUTORS POS (KES)</header>

<div class="container">

<!-- LOGIN -->
<div id="loginSection">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button class="action" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<nav>
  <button onclick="showSection('pos')">POS</button>
  <button onclick="showSection('inventory')">Inventory</button>
  <button onclick="showSection('transfer')">Transfers</button>
</nav>

<!-- POS -->
<div id="pos">
  <h3>Products</h3>
  <div id="products"></div>

  <h3>Cart</h3>
  <div id="cart"></div>
  <button class="success" onclick="checkout()">Checkout</button>
</div>

<!-- INVENTORY -->
<div id="inventory" style="display:none">

  <h3>Stock</h3>
  <div id="stockList"></div>

  <h3>Add Product</h3>
  <div class="grid">
    <input id="item_id" placeholder="Item ID">
    <input id="pname" placeholder="Name">
    <input id="model" placeholder="Model">
    <input id="category" placeholder="Category">
    <input id="price" type="number" placeholder="Price">
    <input id="cost" type="number" placeholder="Cost">
    <input id="stock_qty" type="number" placeholder="Stock">
  </div>
  <button class="action" onclick="addProduct()">Add Product</button>

  <h3>Add Stock</h3>
  <select id="stockProduct"></select>
  <input id="addQty" type="number" placeholder="Quantity">
  <button class="success" onclick="addStock()">Add Stock</button>

</div>

<!-- TRANSFER -->
<div id="transfer" style="display:none">

  <h3>Add Agent</h3>
  <input id="agentName" placeholder="Name">
  <input id="agentPhone" placeholder="Phone">
  <input id="agentId" placeholder="ID Number">
  <button class="action" onclick="addAgent()">Save Agent</button>

  <h3>Transfer Stock</h3>
  <select id="agentSelect"></select>
  <select id="transferProduct"></select>
  <input id="transferQty" type="number" placeholder="Quantity">
  <button class="success" onclick="transferStock()">Transfer</button>

  <h3>History</h3>
  <div id="transferHistory"></div>

</div>

</div>
</div>

<script>
const API="https://js-pos-backend.onrender.com/";
let token="", products=[], cart=[];

// LOGIN
async function login(){
  const res=await fetch(API+"/login",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:username.value,password:password.value})
  });
  const data=await res.json();
  if(!data.token) return alert("Login failed");

  token=data.token;
  loginSection.style.display="none";
  app.style.display="block";

  loadAll();
}

// NAVIGATION
function showSection(id){
  ["pos","inventory","transfer"].forEach(x=>document.getElementById(x).style.display="none");
  document.getElementById(id).style.display="block";
}

// LOAD ALL
function loadAll(){
  loadProducts();
  loadStock();
  loadAgents();
  loadTransfers();
}

// PRODUCTS
async function loadProducts(){
  const res=await fetch(API+"/products",{headers:{Authorization:token}});
  products=await res.json();

  let html="";
  products.forEach((p,i)=>{
    html+=`<div class="card">
      ${p.name} (${p.stock})
      <button class="action" onclick="addToCart(${i})">Add</button>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;
}

// CART
function addToCart(i){
  if(products[i].stock<=0) return alert("Out of stock");
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let total=0, html="";
  cart.forEach(p=>{
    total+=p.price;
    html+=`<div>${p.name} - ${p.price}</div>`;
  });
  html+=`<b>Total: ${total}</b>`;
  document.getElementById("cart").innerHTML=html;
}

// CHECKOUT
async function checkout(){
  const total=cart.reduce((s,p)=>s+p.price,0);

  await fetch(API+"/mpesa",{method:"POST",headers:{Authorization:token}});
  await fetch(API+"/sale",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:token},
    body:JSON.stringify({items:cart,total,profit:0})
  });

  alert("Sale complete");
  cart=[];
  renderCart();
  loadAll();
}

// INVENTORY
async function loadStock(){
  const res=await fetch(API+"/products",{headers:{Authorization:token}});
  const data=await res.json();

  let html="";
  const select=document.getElementById("stockProduct");
  const transferSelect=document.getElementById("transferProduct");

  select.innerHTML="";
  transferSelect.innerHTML="";

  data.forEach(p=>{
    html+=`<div class="card">[${p.item_id}] ${p.name} - ${p.stock}</div>`;
    select.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
    transferSelect.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
  });

  document.getElementById("stockList").innerHTML=html;
}

// ADD PRODUCT
async function addProduct(){
  await fetch(API+"/products",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:token},
    body:JSON.stringify({
      item_id:item_id.value,
      name:pname.value,
      model:model.value,
      category:category.value,
      price:+price.value,
      cost:+cost.value,
      stock:+stock_qty.value
    })
  });
  loadAll();
}

// ADD STOCK
async function addStock(){
  await fetch(API+"/add-stock",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:token},
    body:JSON.stringify({
      product_id:stockProduct.value,
      quantity:+addQty.value
    })
  });
  loadStock();
}

// AGENTS
async function loadAgents(){
  const res=await fetch(API+"/agents",{headers:{Authorization:token}});
  const data=await res.json();

  const select=document.getElementById("agentSelect");
  select.innerHTML="";

  data.forEach(a=>{
    select.innerHTML+=`<option value="${a.id}">
      ${a.name} (${a.phone})
    </option>`;
  });
}

async function addAgent(){
  await fetch(API+"/agents",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:token},
    body:JSON.stringify({
      name:agentName.value,
      phone:agentPhone.value,
      id_number:agentId.value
    })
  });
  loadAgents();
}

// TRANSFER
async function transferStock(){
  const res=await fetch(API+"/transfer",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:token},
    body:JSON.stringify({
      agent_id:agentSelect.value,
      product_id:transferProduct.value,
      quantity:+transferQty.value
    })
  });

  const data=await res.json();
  if(data.error) return alert(data.error);

  alert("Transfer successful");
  loadAll();
}

// HISTORY
async function loadTransfers(){
  const res=await fetch(API+"/transfers",{headers:{Authorization:token}});
  const data=await res.json();

  let html="";
  data.forEach(t=>{
    html+=`<div class="card">
      ${t.agent_name} → ${t.product_name} (${t.quantity})
    </div>`;
  });

  document.getElementById("transferHistory").innerHTML=html;
}
</script>

</body>
</html>
